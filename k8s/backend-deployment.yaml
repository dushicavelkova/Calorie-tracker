apiVersion: apps/v1
kind: Deployment
metadata:
  name: calorie-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calorie-backend
  template:
    metadata:
      labels:
        app: calorie-backend
    spec:
      containers: 
      - name: backend
        image: dushicavelkova/calorie-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:securepassword@db-service:5432/calories_db"