apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: calorie-db
spec:
  serviceName: db-service
  replicas: 1
  selector:
    matchLabels:
      app: calorie-db
  template:
    metadata:
      labels:
        app: calorie-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          value: securepassword
        ports:
        - containerPort: 5432
          name: dbport
        volumeMounts:
        - name: db-persistent-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: db-persistent-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi